<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Lane Battler - Fixed Opening Turn</title>
    <style>
        :root {
            --app-width: min(700px, calc(100vw - 24px));
            --board-shell-width: min(760px, calc(100vw - 24px));
            --board-width: min(600px, calc(100vw - 140px));
            --board-height: 560px;
            --board-gap: 8px;
            --board-padding: 12px;
            --cell-height: 58px;
            --hand-height: 110px;
            --hand-card-width: 60px;
            --hand-card-height: 85px;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 12px; margin: 0; overflow-x: hidden; overflow-y: auto; min-height: 100vh; }
        
        /* Selection Screen */
        #selection-screen { position: fixed; inset: 0; width: 100%; min-height: 100vh; height: 100dvh; background: #111; z-index: 200; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow-x: hidden; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: max(18px, env(safe-area-inset-top)) 12px calc(24px + env(safe-area-inset-bottom)); }
        .select-box { display: flex; gap: 40px; margin-top: 30px; }
        .side-btn { width: 220px; height: 280px; border-radius: 15px; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 4px solid transparent; transition: 0.3s; background: #222; position: relative; z-index: 2; }
        .side-btn:hover { transform: scale(1.05); }
        .side-btn.blue { border-color: #4dabf7; color: #4dabf7; }
        .side-btn.red { border-color: #ff6b6b; color: #ff6b6b; }
        .side-btn.disabled { opacity: 0.35; filter: grayscale(0.35); cursor: not-allowed; pointer-events: none; }
        #game-over.winner-blue { border: 4px solid #4dabf7; box-shadow: inset 0 0 0 2px rgba(77,171,247,0.25); }
        #game-over.winner-red { border: 4px solid #ff6b6b; box-shadow: inset 0 0 0 2px rgba(255,107,107,0.25); }
        .side-btn h2 { margin: 10px 0; font-size: 2rem; }
        .side-btn p { font-size: 0.85rem; color: #aaa; text-align: center; }
        #selection-screen h1 { margin: 6px 0 2px; font-size: clamp(2.2rem, 8vw, 4rem); line-height: 0.95; text-align: center; }
        .mode-select-wrap { margin-top: 18px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .mode-select-label { font-size: 0.9rem; letter-spacing: 0.08em; color: #aaa; text-transform: uppercase; }
        .mode-select { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .mode-option { display: flex; align-items: center; gap: 8px; background: #222; border: 1px solid #444; border-radius: 999px; padding: 8px 14px; color: #ddd; cursor: pointer; user-select: none; }
        .mode-option input { accent-color: #00aa00; }
        .mode-option:hover { border-color: #666; }

        .pick-options { margin-top: 48px; display: flex; flex-direction: column; align-items: center; gap: 18px; }
        .pick-option-group { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .pick-option-label { font-size: 0.9rem; letter-spacing: 0.08em; color: #fff; text-transform: none; }
        .pick-option-row { display: flex; gap: 12px; flex-wrap: nowrap; justify-content: center; align-items: center; }
        .inactive-lane { opacity: 0.28; filter: grayscale(0.35); }
        .inactive-lane::after { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.18); border-radius: 4px; pointer-events: none; }
        #pass-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.82); z-index: 500; align-items: center; justify-content: center; }
        .pass-panel { background: #1b1b1b; border: 1px solid #3a3a3a; border-radius: 18px; padding: 28px 24px; min-width: 280px; text-align: center; box-shadow: 0 12px 32px rgba(0,0,0,0.35); }
        .pass-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; }
        .pass-copy { color: #cfcfcf; margin-bottom: 16px; }
        .pass-btn { background: #2b2b2b; color: #fff; border: 1px solid #555; border-radius: 999px; padding: 10px 20px; cursor: pointer; font-size: 1rem; }
        .pass-btn:hover { border-color: #888; }

        /* Header Layout */
        .header { display: flex; justify-content: space-between; align-items: center; width: var(--app-width); margin-bottom: 14px; padding: 12px 16px; background: #2d2d2d; border-radius: 8px; border: 1px solid #444;}
        .header-left, .header-right { display: flex; align-items: center; }
        .header-left { min-width: 150px; }
        .header-right { min-width: 220px; justify-content: flex-end; gap: 18px; }
        .p2-stats { font-weight: bold; min-width: 150px; }
        .p1-stats { font-weight: bold; min-width: 150px; text-align: right; }
        .turn-indicator { font-size: 1.2rem; font-weight: bold; color: #00aa00; flex-grow: 1; text-align: center; }
        
        .auto-advance-wrap { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; color: #aaa; flex-shrink: 0; }
        .side-auto-wrap { justify-content: space-between; background: #2d2d2d; border: 1px solid #444; border-radius: 8px; padding: 6px 10px; width: 100px; box-sizing: border-box; }

        /* Board */
        .board-shell { position: relative; width: var(--board-shell-width); display: flex; justify-content: center; align-items: center; gap: 10px; }
        .board-center-wrap { position: relative; display: flex; flex-direction: column; align-items: center; gap: 6px; width: var(--board-width); }
        .suit-legend {
            position: relative;
            top: auto;
            left: auto;
            transform: none;
            width: calc(100% - 8px);
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 0;
            padding: 4px 10px 5px;
            border-radius: 10px;
            background: #444;
            border: 1px solid #555;
            box-shadow: 0 3px 8px rgba(0,0,0,0.18);
            z-index: 5;
            pointer-events: none;
            white-space: nowrap;
            box-sizing: border-box;
            flex: 0 0 auto;
        }
        .suit-legend.show { display: inline-flex; }
        .suit-legend .suit {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
            min-width: 24px;
            text-align: center;
        }
        .suit-legend .suit.redish { color: #d63b3b; }
        .suit-legend .suit.blackish { color: #111; }
        .suit-legend .arrow {
            width: 0;
            height: 0;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-left: 7px solid #19cc19;
            opacity: 0.95;
            transform: translateY(1px);
            filter: drop-shadow(0 0 1px rgba(25,204,25,0.12));
        }
        .board { display: grid; grid-template-columns: repeat(6, 1fr); gap: var(--board-gap); background: #333; padding: var(--board-padding); border-radius: 8px; width: var(--board-width); height: var(--board-height); border: 2px solid #444; position: relative; overflow: hidden;}
        .side-hp { position: absolute; top: 50%; transform: translateY(-50%); width: 70px; display: flex; flex-direction: column; align-items: center; gap: 6px; pointer-events: none; z-index: 2; }
        .side-hp.left { left: 0; }
        .side-hp.right { right: 0; }
        .side-hp-label { font-size: 0.8rem; font-weight: bold; letter-spacing: 0.08em; color: #aaa; text-align: center; }
        .side-hp-value { font-size: 3.2rem; font-weight: 900; line-height: 1; text-align: center; }
        .cell { background: #444; border-radius: 4px; display: flex; justify-content: center; align-items: center; position: relative; border: 1px solid #555; height: var(--cell-height); min-height: var(--cell-height);}
        
        /* Zone Coloring */
        .zone-red { border: 2px solid #ff6b6b; background: #3a2525; }
        .zone-blue { border: 2px solid #4dabf7; background: #1e2a38; }
        .trail-p1-blue { background: #21466b; }
        .trail-p1-red { background: #5a2a2a; }
        .trail-p2-blue { background: #21466b; }
        .trail-p2-red { background: #5a2a2a; }

        .card { background: white; border-radius: 6px; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; box-shadow: 0 4px 8px rgba(0,0,0,0.5); font-weight: bold; position: relative; width: 85%; height: 90%; color: #2d3436; transition: 0.2s; pointer-events: none; overflow: hidden;}
        .board .card-dir { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); font-size: 1rem; line-height: 1; }
        .board .card-rank-suit { position: absolute; right: 7px; top: 5px; font-size: 0.9rem; line-height: 1; text-align: right; }
        .board .card-stock { position: absolute; left: 50%; bottom: 4px; transform: translateX(-50%); font-size: 1.75rem; font-weight: 900; line-height: 1; color: inherit; }
        .card-stock.damaged { color: #00aa00; }
        .hand .card-top { position: absolute; top: 6px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; margin-top: 0; line-height: 1.05; }
        .hand .card-rank-suit { font-size: 0.95rem; letter-spacing: 0.01em; }
        .hand .card-stock { position: absolute; top: 62%; left: 50%; transform: translate(-50%, -50%); font-size: 1.65rem; font-weight: 900; line-height: 1; color: inherit; }
        .card.red-suit { color: #d63031; }
        .card.black-suit { color: #2d3436; }
        .ace-card { border: 2px solid #00aa00; box-shadow: 0 0 10px #00aa00 !important; }
        
        .border-blue { border-bottom: 4px solid #4dabf7; }
        .border-red { border-bottom: 4px solid #ff6b6b; }
        .border-ai-blue { border-top: 4px solid #4dabf7; }
        .border-ai-red { border-top: 4px solid #ff6b6b; }

        .controls-area { display: flex; gap: 12px; margin-top: 14px; width: var(--app-width); align-items: center; }
        .btn-group { display: flex; flex-direction: column; gap: 8px; align-items: stretch; width: 100px; }
        @keyframes nextTurnPulse {
            0%   { box-shadow: 0 0 0 0 rgba(255,255,255,0.00), 0 4px 0 #0b6e0b; }
            50%  { box-shadow: 0 0 0 6px rgba(255,255,255,0.35), 0 4px 0 #0b6e0b; }
            100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.00), 0 4px 0 #0b6e0b; }
        }
        .next-btn { width: 100px; height: 60px; font-size: 0.9rem; cursor: pointer; background: #00aa00; border: 3px solid transparent; border-radius: 8px; font-weight: 800; color: #fff; box-shadow: 0 4px 0 #0b6e0b; }
        .next-btn.needs-manual { border-color: #ffffff; box-shadow: 0 0 0 4px rgba(255,255,255,0.22), 0 4px 0 #0b6e0b; animation: nextTurnPulse 1.2s ease-in-out infinite; }
        .undo-btn { width: 100px; height: 30px; font-size: 0.75rem; cursor: pointer; background: #444; border: 1px solid #666; border-radius: 8px; color: #fff; }
        
        .hand { display: flex; gap: 8px; flex-grow: 1; background: #2d2d2d; padding: 10px; border-radius: 12px; height: var(--hand-height); align-items: center; justify-content: center; border: 1px solid #444; overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; }
        .hand .card { width: var(--hand-card-width); height: calc(var(--hand-card-height) + 1px); flex: 0 0 auto; }
        .hand .card { pointer-events: auto; width: var(--hand-card-width); height: var(--hand-card-height); cursor: pointer; }
        .hand .card.selected { border: 3px solid #00aa00; transform: translateY(-10px); box-shadow: 0 0 15px #00aa00; }
        
        .log { margin-top: 12px; width: var(--app-width); height: 70px; background: #000; border-radius: 8px; padding: 10px; overflow-y: auto; font-family: monospace; font-size: 0.75rem; color: #00ff41; border: 1px solid #333;}
        #game-over { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
        .score-stack { display: flex; flex-direction: column; gap: 10px; align-items: center; margin: 10px 0 18px; }
        .score-line { display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .score-label { font-size: 0.85rem; letter-spacing: 0.06em; text-transform: uppercase; color: #b8b8b8; font-weight: 700; }
        .score-values { font-size: 1.05rem; font-weight: 900; color: #fff; }
        .score-left-blue { color: #4dabf7; }
        .score-left-red { color: #ff6b6b; }
        .score-right-blue { color: #4dabf7; }
        .score-right-red { color: #ff6b6b; }
        .score-sep { color: #e8e8e8; padding: 0 6px; }
        .new-game-btn { padding: 10px 20px; cursor: pointer; background: #00aa00; border: none; border-radius: 8px; color: #fff; font-weight: 800; box-shadow: 0 4px 0 #0b6e0b; }
        

        @media (max-width: 820px) {
            :root {
                --app-width: calc(100vw - 12px);
                --board-shell-width: calc(100vw - 12px);
                --board-width: calc(100vw - 12px);
                --board-height: min(56dvh, calc((100vw - 12px) * 1.10));
                --board-gap: 4px;
                --board-padding: 6px;
                --cell-height: calc((var(--board-height) - (var(--board-padding) * 2) - (var(--board-gap) * 7)) / 8);
                --hand-height: 82px;
                --hand-card-width: 44px;
                --hand-card-height: 62px;
            }
            body { padding: 6px; }
            #selection-screen {
                justify-content: flex-start;
                align-items: center;
                padding: max(14px, env(safe-area-inset-top)) 12px calc(30px + env(safe-area-inset-bottom));
            }
            .mode-select-wrap { margin-top: 8px; gap: 8px; }
            .mode-select-label, .pick-option-label { font-size: 0.82rem; letter-spacing: 0.05em; }
            .mode-select { gap: 10px; }
            .mode-option { padding: 8px 12px; gap: 6px; }
            .select-box { gap: 14px; width: min(100%, 680px); margin-top: 20px; }
            .side-btn { width: calc(50vw - 22px); max-width: 190px; min-width: 146px; height: min(220px, 31vh); min-height: 180px; }
            .side-btn h2 { font-size: 1.4rem; }
            .side-btn p { font-size: 0.8rem; }
            .pick-options { margin-top: 26px; gap: 14px; padding-bottom: 14px; }
            .pick-option-group { gap: 8px; }

            .header {
                gap: 6px;
                padding: 6px 10px;
                margin-bottom: 8px;
                min-height: 0;
            }
            .header-left, .header-right, .turn-indicator { min-width: 0; }
            .header-left, .header-right { flex: 0 0 auto; }
            .p2-stats, .p1-stats { min-width: 0; font-size: 0.95rem; }
            .p1-stats { text-align: right; }
            .turn-indicator { flex: 1 1 auto; font-size: 0.95rem; }

            .board-shell { flex-direction: column; gap: 0; }
            .side-hp { display: none; }
            .board { order: 1; }
            .board-center-wrap { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; gap: 5px; }
            .suit-legend { width: calc(100% - 6px); padding: 4px 8px 5px; }
            .suit-legend .suit { font-size: 1.45rem; }
            .suit-legend .arrow { border-top-width: 4px; border-bottom-width: 4px; border-left-width: 7px; }

            .controls-area {
                position: sticky;
                bottom: 0;
                z-index: 30;
                gap: 8px;
                margin-top: 8px;
                background: linear-gradient(to top, rgba(26,26,26,0.99), rgba(26,26,26,0.95));
                padding: 6px 0 calc(6px + env(safe-area-inset-bottom));
                align-items: stretch;
            }
            .btn-group { width: 72px; flex: 0 0 72px; gap: 6px; }
            .next-btn { width: 72px; height: 48px; font-size: 0.74rem; line-height: 1.05; }
            .undo-btn { width: 72px; height: 26px; font-size: 0.68rem; }
            .auto-advance-wrap { font-size: 0.65rem; }
            .side-auto-wrap { width: 72px; padding: 5px 6px; }
            .hand {
                justify-content: flex-start;
                gap: 4px;
                padding: 6px;
                height: var(--hand-height);
                overflow-x: hidden;
            }
            .hand .card {
                width: calc((100vw - 12px - 72px - 8px - 12px - 20px) / 6);
                min-width: 40px;
                max-width: 46px;
                height: var(--hand-card-height);
            }
            .board .card-dir { left: 3px; font-size: 0.72rem; }
            .board .card-rank-suit { right: 3px; top: 2px; font-size: 0.62rem; }
            .board .card-stock { bottom: 1px; font-size: 1rem; }
            .log { display: none; }
        }

        @media (max-width: 430px) {
            :root {
                --board-height: min(54dvh, calc((100vw - 12px) * 1.06));
                --hand-height: 78px;
                --hand-card-height: 58px;
            }
            .header { padding: 5px 8px; }
            .p2-stats, .p1-stats, .turn-indicator { font-size: 0.88rem; }
            .btn-group { width: 68px; flex-basis: 68px; }
            .next-btn { width: 68px; height: 44px; font-size: 0.7rem; }
            .undo-btn, .side-auto-wrap { width: 68px; }
            .hand .card {
                width: calc((100vw - 12px - 68px - 8px - 12px - 20px) / 6);
                min-width: 38px;
                max-width: 43px;
            }
        }

        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #00aa00; }
        input:checked + .slider:before { transform: translateX(16px); }
        @media (max-width: 460px) {
            #selection-screen h1 { font-size: clamp(1.8rem, 9vw, 2.8rem); margin-top: 2px; }
            .mode-select { width: 100%; justify-content: center; }
            .mode-option { font-size: 0.92rem; }
            .select-box { gap: 10px; margin-top: 16px; }
            .side-btn { width: calc(50vw - 18px); min-width: 132px; height: min(200px, 28vh); min-height: 164px; }
            .side-btn h2 { font-size: 1.15rem; }
            .side-btn p { font-size: 0.74rem; }
            .pick-options { margin-top: 20px; gap: 12px; }
            .pick-option-row { gap: 10px; }
        }

    </style>
</head>
<body>

    <div id="selection-screen">
        <h1>Pick...</h1>
        <div class="mode-select-wrap">
            <div class="mode-select-label">Mode</div>
            <div class="mode-select">
                <label class="mode-option">
                    <input type="radio" name="ai-mode" value="normal" checked>
                    <span>Normal Mode</span>
                </label>
                <label class="mode-option">
                    <input type="radio" name="ai-mode" value="cracked">
                    <span>Possibly Cracked Mode</span>
                </label>
            </div>
        </div>
        <div class="select-box">
            <div class="side-btn blue" id="blue-side-btn" onclick="startGame('blue')">
                <h2>BLUE</h2>
                <p>Moves First<br>Cards: Black</p>
            </div>
            <div class="side-btn red" id="red-side-btn" onclick="startGame('red')">
                <h2>RED</h2>
                <p>Moves Second<br>Cards: Red</p>
            </div>
        </div>

        <div class="pick-options">
            <div class="pick-option-group">
                <div class="pick-option-label">Suit Functions</div>
                <div class="pick-option-row">
                    <label class="mode-option">
                        <input type="radio" name="suit-mode" value="off" checked>
                        <span>Off</span>
                    </label>
                    <label class="mode-option">
                        <input type="radio" name="suit-mode" value="on">
                        <span>On</span>
                    </label>
                </div>
            </div>

            <div class="pick-option-group">
                <div class="pick-option-label">Lanes</div>
                <div class="pick-option-row">
                    <label class="mode-option">
                        <input type="radio" name="lane-mode" value="normal" checked>
                        <span>Normal</span>
                    </label>
                    <label class="mode-option">
                        <input type="radio" name="lane-mode" value="narrows">
                        <span>Narrows</span>
                    </label>
                </div>
            </div>

            <div class="pick-option-group">
                <div class="pick-option-label">Hotseat</div>
                <div class="pick-option-row">
                    <label class="mode-option">
                        <input type="radio" name="game-mode" value="ai" checked>
                        <span>Off</span>
                    </label>
                    <label class="mode-option">
                        <input type="radio" name="game-mode" value="hotseat">
                        <span>On</span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <div id="pass-overlay">
        <div class="pass-panel">
            <div class="pass-title" id="pass-title">Pass to Player</div>
            <div class="pass-copy" id="pass-copy">Keep the hand hidden, then continue.</div>
            <button class="pass-btn" onclick="confirmHotseatPass()">Ready</button>
        </div>
    </div>

    <div class="header">
        <div class="header-left">
            <div class="p2-stats" id="p2-label">AI: 20 HP</div>
        </div>
        <div id="turn-display" class="turn-indicator">Your Turn</div>
        <div class="header-right">
            <div class="p1-stats" id="p1-label">YOU: 20 HP</div>
        </div>
    </div>

    <div class="board-shell">
        <div class="side-hp left">
            <div class="side-hp-label" id="p2-big-label">AI</div>
            <div class="side-hp-value" id="p2-big-hp">20</div>
        </div>

        <div class="board-center-wrap">
            <div id="suit-legend" class="suit-legend" aria-hidden="true">
                <span class="suit blackish">♣</span>
                <span class="arrow"></span>
                <span class="suit redish">♦</span>
                <span class="arrow"></span>
                <span class="suit blackish">♠</span>
                <span class="arrow"></span>
                <span class="suit redish">♥</span>
                <span class="arrow"></span>
                <span class="suit blackish">♣</span>
            </div>
            <div class="board" id="board">
                <div id="game-over">
                    <h1 id="winner-text">Winner!</h1>
                    <div id="score-text" class="score-stack"><div class="score-line"><span class="score-label">Battle Score</span><span id="battle-score-values" class="score-values">0 • 0</span></div><div class="score-line"><span class="score-label">Final Score</span><span id="final-score-values" class="score-values">0 • 0</span></div></div>
                    <button class="new-game-btn" onclick="location.reload()">New Game</button>
                </div>
            </div>
        </div>

        <div class="side-hp right">
            <div class="side-hp-label" id="p1-big-label">YOU</div>
            <div class="side-hp-value" id="p1-big-hp">20</div>
        </div>
    </div>

    <div class="controls-area">
        <div class="btn-group">
            <div class="auto-advance-wrap side-auto-wrap">
                Auto
                <label class="switch">
                    <input type="checkbox" id="auto-toggle">
                    <span class="slider"></span>
                </label>
            </div>
            <button class="next-btn" id="next-btn" onclick="resolveTurn()">NEXT<br>TURN</button>
            <button class="undo-btn" id="undo-btn" onclick="undoPlacement()" disabled>UNDO</button>
        </div>
        <div id="p1-hand" class="hand"></div>
    </div>

    <div id="log" class="log"></div>

<script>

function suitSurpasses(suitA, suitB) {
  const norm = (s) => {
    if (s === '♣' || s === 'Clubs') return 'Clubs';
    if (s === '♦' || s === 'Diamonds') return 'Diamonds';
    if (s === '♠' || s === 'Spades') return 'Spades';
    if (s === '♥' || s === 'Hearts') return 'Hearts';
    return s;
  };

  suitA = norm(suitA);
  suitB = norm(suitB);

  return (
    (suitA === "Clubs" && suitB === "Diamonds") ||
    (suitA === "Diamonds" && suitB === "Spades") ||
    (suitA === "Spades" && suitB === "Hearts") ||
    (suitA === "Hearts" && suitB === "Clubs")
  );
}

    const suits = [{s:'♥', c:'red-suit'}, {s:'♦', c:'red-suit'}, {s:'♣', c:'black-suit'}, {s:'♠', c:'black-suit'}];
    const ranks = [{r:'A', v:14}, {r:'2', v:2}, {r:'3', v:3}, {r:'4', v:4}, {r:'5', v:5}, {r:'6', v:6}, {r:'7', v:7}, {r:'8', v:8}, {r:'9', v:9}, {r:'10', v:10}, {r:'J', v:11}, {r:'Q', v:12}, {r:'K', v:13}];
    
    let p1Hp = 20, p2Hp = 20, p1Deck = [], p2Deck = [], p1Hand = [], p2Hand = [];
    let board = Array(8).fill(null).map(() => Array(6).fill(null));
    let tileTrail = Array(8).fill(null).map(() => Array(6).fill(null));
    let selectedHandIndex = null, p1PlacedThisTurn = false, isAnim = false, lastPlacedCol = null;
    let playerSide = 'blue';
    let aiMode = 'normal';
    let gameMode = 'ai';
    let laneMode = 'normal';
    let laneCount = 6;
    let suitFunctionsEnabled = false;
    let finalResolveMode = false;
    let gameOverShown = false;
    let lethalSnapshot = null;
    let p1ColorName = 'BLUE', p2ColorName = 'RED';
    let hotseatStage = 'p1'; // p1, pass, p2, resolve
    let p2PlacedThisTurn = false;
    let p2LastPlacedCol = null;

    function getActiveLanes() {
        return laneMode === 'narrows' ? [1, 2, 3] : [0, 1, 2, 3, 4, 5];
    }

    function isLaneActive(c) {
        return getActiveLanes().includes(c);
    }

    function currentHand() {
        if (gameMode !== 'hotseat') return p1Hand;
        if (hotseatStage === 'p1') return p1Hand;
        if (hotseatStage === 'p2') return p2Hand;
        return [];
    }

    function currentStageRow() {
        if (gameMode !== 'hotseat') return playerStagingRow();
        return hotseatStage === 'p2' ? aiStagingRow() : playerStagingRow();
    }

    function currentStageOwner() {
        if (gameMode !== 'hotseat') return 1;
        return hotseatStage === 'p2' ? 2 : 1;
    }

    function boardIsFlipped() {
        return gameMode === 'hotseat' && (hotseatStage === 'p2' || hotseatStage === 'pass');
    }

    function viewRowToBoardRow(viewRow) {
        return boardIsFlipped() ? 7 - viewRow : viewRow;
    }

    function boardRowToViewRow(boardRow) {
        return boardIsFlipped() ? 7 - boardRow : boardRow;
    }

    function confirmHotseatPass() {
        hotseatStage = 'p2';
        selectedHandIndex = null;
        render();
    }

    function hotseatEnabledFromMenu() {
        return (document.querySelector('input[name="game-mode"]:checked')?.value || 'ai') === 'hotseat';
    }

    function updateSideButtonState() {
        const redBtn = document.getElementById('red-side-btn');
        if (!redBtn) return;
        redBtn.classList.toggle('disabled', hotseatEnabledFromMenu());
    }

    function playerStagingRow() {
        return 7;
    }

    function aiStagingRow() {
        return 0;
    }

    function hasPlayerStagedCard() {
        const row = playerStagingRow();
        return board[row].some(cell => cell && cell.p === 1);
    }

    function hasAiStagedCard() {
        const row = aiStagingRow();
        return board[row].some(cell => cell && cell.p === 2);
    }

    function playerCanStageCard() {
        return p1Hand.length > 0;
    }

    function aiCanStageCard() {
        return p2Hand.length > 0;
    }

    function readyToAdvanceTurn() {
        if (finalResolveMode) return true;

        const playerReady = hasPlayerStagedCard() || !playerCanStageCard();
        const aiReady = hasAiStagedCard() || !aiCanStageCard();

        if (gameMode === 'hotseat') {
            return hotseatStage === 'resolve' && playerReady && aiReady;
        }

        if (playerCanStageCard() && !p1PlacedThisTurn) return false;
        return playerReady && aiReady;
    }

    function getTrailClass(owner) {
        if (!owner) return '';
        if (owner === 1) return playerSide === 'blue' ? 'trail-p1-blue' : 'trail-p1-red';
        return playerSide === 'blue' ? 'trail-p2-red' : 'trail-p2-blue';
    }

    function markTrail(r, c, owner) {
        if (r >= 0 && r < 8 && c >= 0 && c < 6) tileTrail[r][c] = owner;
    }

    function startGame(side) {
        if (hotseatEnabledFromMenu() && side === 'red') return;
        playerSide = side;
        aiMode = document.querySelector('input[name="ai-mode"]:checked')?.value || 'normal';
        gameMode = document.querySelector('input[name="game-mode"]:checked')?.value || 'ai';
        laneMode = document.querySelector('input[name="lane-mode"]:checked')?.value || 'normal';
        laneCount = laneMode === 'narrows' ? 3 : 6;
        suitFunctionsEnabled = (document.querySelector('input[name="suit-mode"]:checked')?.value || 'off') === 'on';

        board = Array(8).fill(null).map(() => Array(6).fill(null));
        tileTrail = Array(8).fill(null).map(() => Array(6).fill(null));
        p1Hand = [];
        p2Hand = [];
        p1Deck = [];
        p2Deck = [];
        const startHp = (aiMode === 'cracked' && gameMode === 'ai') ? 30 : 20;
        p1Hp = startHp;
        p2Hp = startHp;
        finalResolveMode = false;
        gameOverShown = false;
        lethalSnapshot = null;
        p1PlacedThisTurn = false;
        p2PlacedThisTurn = false;
        hotseatStage = 'p1';
        selectedHandIndex = null;
        lastPlacedCol = null;
        p2LastPlacedCol = null;
        isAnim = false;

        document.getElementById('selection-screen').style.display = 'none';

        const p1L = document.getElementById('p1-label');
        const p2L = document.getElementById('p2-label');

        let fullDeck = [];
        suits.forEach(s => ranks.forEach(r => fullDeck.push({
            ...r,
            suit: s.s,
            color: s.c,
            maxHp: r.r === 'A' ? 1 : r.v,
            hp: r.r === 'A' ? 1 : r.v,
            uuid: self.crypto.randomUUID()
        })));

        const redCards = fullDeck.filter(c => c.color === 'red-suit').sort(() => Math.random() - 0.5);
        const blackCards = fullDeck.filter(c => c.color === 'black-suit').sort(() => Math.random() - 0.5);

        if (side === 'blue') {
            p1Deck = blackCards;
            p2Deck = redCards;
            p1ColorName = 'BLUE';
            p2ColorName = 'RED';
            p1L.style.color = '#4dabf7';
            p2L.style.color = '#ff6b6b';
        } else {
            p1Deck = redCards;
            p2Deck = blackCards;
            p1ColorName = 'RED';
            p2ColorName = 'BLUE';
            p1L.style.color = '#ff6b6b';
            p2L.style.color = '#4dabf7';
        }

        drawCards();

        if (gameMode === 'hotseat') {
            hotseatStage = side === 'blue' ? 'p1' : 'p2';
            logMsg(`Hotseat: ${hotseatStage === 'p1' ? 'P1' : 'P2'} stages first.`);
        } else if (side === 'blue') {
            logMsg("Blue moves first. Your turn.");
        } else {
            logMsg("Blue moves first. AI is staging a card...");
            aiPlaceCard();
        }

        render();
    }

    function drawCards() {
        while(p1Hand.length < 6 && p1Deck.length > 0) p1Hand.push(p1Deck.pop());
        while(p2Hand.length < 6 && p2Deck.length > 0) p2Hand.push(p2Deck.pop());
    }

    function render() {
        const p1DisplayHp = finalResolveMode ? Math.max(0, p1Hp) : p1Hp;
        const p2DisplayHp = finalResolveMode ? Math.max(0, p2Hp) : p2Hp;
        const p1Name = gameMode === 'hotseat' ? 'P1' : 'YOU';
        const p2Name = gameMode === 'hotseat' ? 'P2' : 'AI';
        document.getElementById('p1-label').innerText = `${p1Name}: ${p1DisplayHp} HP`;
        document.getElementById('p2-label').innerText = `${p2Name}: ${p2DisplayHp} HP`;
        document.getElementById('p1-big-label').innerText = `${p1Name} ${p1ColorName}`;
        document.getElementById('p2-big-label').innerText = `${p2Name} ${p2ColorName}`;
        document.getElementById('p1-big-hp').innerText = p1DisplayHp;
        document.getElementById('p2-big-hp').innerText = p2DisplayHp;
        document.getElementById('p1-big-hp').style.color = p1ColorName === 'BLUE' ? '#4dabf7' : '#ff6b6b';
        document.getElementById('p2-big-hp').style.color = p2ColorName === 'BLUE' ? '#4dabf7' : '#ff6b6b';
        document.getElementById('undo-btn').disabled = gameMode === 'hotseat' || !p1PlacedThisTurn || isAnim;

        const hasBoardCards = board.some(row => row.some(cell => cell));
        const manualCleanupNeeded = ((gameMode === 'hotseat' ? (p1Hand.length === 0 && p2Hand.length === 0) : p1Hand.length === 0) && hasBoardCards) || (finalResolveMode && hasBoardCards);
        const nextBtn = document.getElementById('next-btn');
        nextBtn.classList.toggle('needs-manual', manualCleanupNeeded);
        nextBtn.disabled = isAnim || gameOverShown || !readyToAdvanceTurn();

        const turnEl = document.getElementById('turn-display');
        if (gameMode === 'hotseat') {
            if (hotseatStage === 'pass') turnEl.innerText = 'Pass Device';
            else if (hotseatStage === 'resolve') turnEl.innerText = 'Ready to Resolve';
            else turnEl.innerText = hotseatStage === 'p1' ? 'P1 Stage' : 'P2 Stage';
        } else {
            turnEl.innerText = readyToAdvanceTurn() ? 'Ready to Resolve' : 'Your Turn';
        }

        const suitLegend = document.getElementById('suit-legend');
        if (suitLegend) suitLegend.classList.toggle('show', !!suitFunctionsEnabled);

        const passOverlay = document.getElementById('pass-overlay');
        passOverlay.style.display = (gameMode === 'hotseat' && hotseatStage === 'pass') ? 'flex' : 'none';
        document.getElementById('pass-title').innerText = playerSide === 'blue' ? 'Pass to P2' : 'Pass to P1';
        document.getElementById('pass-copy').innerText = playerSide === 'blue' ? 'Keep the hand hidden, then let Player 2 stage a card.' : 'Keep the hand hidden, then let Player 1 stage a card.';

        const boardEl = document.getElementById('board');
        const overlay = document.getElementById('game-over');
        const activeLanes = getActiveLanes();
        boardEl.innerHTML = '';
        boardEl.appendChild(overlay);
        boardEl.style.gridTemplateColumns = `repeat(${activeLanes.length}, 1fr)`;
        boardEl.style.width = laneMode === 'narrows' ? 'min(320px, calc(100vw - 140px))' : 'var(--board-width)';
        const boardWrap = document.querySelector('.board-center-wrap');
        if (boardWrap) boardWrap.style.width = boardEl.style.width;

        for (let vr = 0; vr < 8; vr++) {
            for (const c of activeLanes) {
                const r = viewRowToBoardRow(vr);
                const cell = document.createElement('div');
                let zoneClass = "";
                if (!boardIsFlipped()) {
                    if (playerSide === 'blue') {
                        if (r === 0) zoneClass = "zone-red";
                        if (r === 7) zoneClass = "zone-blue";
                    } else {
                        if (r === 0) zoneClass = "zone-blue";
                        if (r === 7) zoneClass = "zone-red";
                    }
                } else {
                    if (playerSide === 'blue') {
                        if (vr === 0) zoneClass = "zone-blue";
                        if (vr === 7) zoneClass = "zone-red";
                    } else {
                        if (vr === 0) zoneClass = "zone-red";
                        if (vr === 7) zoneClass = "zone-blue";
                    }
                }
                const trailClass = getTrailClass(tileTrail[r][c]);
                cell.className = `cell ${zoneClass} ${trailClass}`;
                cell.onclick = () => placeCard(r, c);

                if (board[r][c]) {
                    const card = board[r][c];
                    let borderClass = "";
                    if (card.p === 1) borderClass = playerSide === 'blue' ? 'border-blue' : 'border-red';
                    else borderClass = playerSide === 'blue' ? 'border-ai-red' : 'border-ai-blue';

                    const dir = boardIsFlipped()
                        ? (card.p === 1 ? '↓' : '↑')
                        : (card.p === 1 ? '↑' : '↓');

                    cell.innerHTML = `
                        <div class="card ${card.color} ${borderClass} ${card.r === 'A' ? 'ace-card' : ''}" data-uuid="${card.uuid}">
                            <div class="card-dir">${dir}</div>
                            <div class="card-rank-suit">${card.r}${card.suit}</div>
                            <div class="card-stock ${card.hp < card.maxHp && card.hp > 0 ? 'damaged' : ''}">${card.hp}</div>
                        </div>`;
                }
                boardEl.appendChild(cell);
            }
        }

        const handEl = document.getElementById('p1-hand');
        handEl.innerHTML = '';
        if (gameMode === 'hotseat' && (hotseatStage === 'pass' || hotseatStage === 'resolve')) return;

        const activeHand = currentHand();
        const alreadyPlaced = gameMode === 'hotseat'
            ? ((hotseatStage === 'p1' && hasPlayerStagedCard()) || (hotseatStage === 'p2' && hasAiStagedCard()))
            : p1PlacedThisTurn;

        activeHand.forEach((card, i) => {
            const cEl = document.createElement('div');
            cEl.className = `card ${card.color} ${selectedHandIndex === i ? 'selected' : ''} ${card.r === 'A' ? 'ace-card' : ''}`;
            cEl.innerHTML = `
                <div class="card-top">
                    <div class="card-rank-suit">${card.r}${card.suit}</div>
                </div>
                <div class="card-stock ${card.hp < card.maxHp && card.hp > 0 ? 'damaged' : ''}">${card.hp}</div>`;
            cEl.onclick = () => {
                if (!isAnim && !alreadyPlaced) {
                    selectedHandIndex = i;
                    render();
                }
            };
            handEl.appendChild(cEl);
        });
    }

    function placeCard(r, c) {
        if (isAnim || finalResolveMode || selectedHandIndex === null || board[r][c] || !isLaneActive(c)) return;

        if (gameMode === 'hotseat') {
            const owner = currentStageOwner();
            const hand = currentHand();
            const row = currentStageRow();

            if (r !== row) return;
            if ((owner === 1 && hasPlayerStagedCard()) || (owner === 2 && hasAiStagedCard())) return;

            board[r][c] = { ...hand.splice(selectedHandIndex, 1)[0], p: owner };
            markTrail(r, c, owner);

            if (owner === 1) {
                p1PlacedThisTurn = true;
                lastPlacedCol = c;
                if (p2Hand.length > 0) {
                    hotseatStage = 'pass';
                } else {
                    hotseatStage = 'resolve';
                }
            } else {
                p2PlacedThisTurn = true;
                p2LastPlacedCol = c;
                hotseatStage = 'resolve';
            }

            selectedHandIndex = null;
            render();

            if (document.getElementById('auto-toggle').checked && readyToAdvanceTurn()) {
                setTimeout(resolveTurn, 400);
            }
            return;
        }

        if (p1PlacedThisTurn || r !== playerStagingRow()) return;
        board[r][c] = { ...p1Hand.splice(selectedHandIndex, 1)[0], p: 1 };
        markTrail(r, c, 1);
        lastPlacedCol = c;
        selectedHandIndex = null;
        p1PlacedThisTurn = true;

        if (playerSide === 'blue') aiPlaceCard();

        render();

        if(document.getElementById('auto-toggle').checked && readyToAdvanceTurn()) {
            setTimeout(resolveTurn, 400);
        }
    }

    function undoPlacement() {
        if (!p1PlacedThisTurn || isAnim || finalResolveMode) return;
        const row = playerStagingRow();
        p1Hand.push(board[row][lastPlacedCol]);
        board[row][lastPlacedCol] = null;
        
        if(playerSide === 'blue') {
            for (let c=0; c<6; c++) { 
                if (board[0][c] && board[0][c].p === 2) { 
                    p2Hand.push(board[0][c]); 
                    board[0][c] = null; 
                    break; 
                } 
            }
        }
        
        p1PlacedThisTurn = false;
        render();
    }

    function aiPlaceCardNormal() {
        if (p2Hand.length === 0) return;

        const activeLanes = getActiveLanes();
        const openLanes = activeLanes.filter(c => !board[0][c]);
        if (!openLanes.length) return;

        let bestLane = openLanes[0];
        let bestScore = Infinity;

        for (const c of openLanes) {
            let score = 0;
            for (let r = 0; r < 8; r++) {
                if (board[r][c] && board[r][c].p === 2) score++;
            }
            if (score < bestScore) {
                bestScore = score;
                bestLane = c;
            }
        }

        p2Hand.sort((a, b) => b.v - a.v);
        board[0][bestLane] = { ...p2Hand.shift(), p: 2 };
        markTrail(0, bestLane, 2);
    }

    function aiPlaceCardCracked() {
        if(p2Hand.length === 0) return;

        const legalLanes = [];
        for (const c of getActiveLanes()) {
            if (!board[0][c]) legalLanes.push(c);
        }
        if (!legalLanes.length) return;

        const postureRoll = Math.random();
        const posture =
            postureRoll < 0.28 ? 'aggressive' :
            postureRoll < 0.52 ? 'defensive' :
            postureRoll < 0.76 ? 'opportunistic' : 'swarmy';

        const moves = [];
        for (let i = 0; i < p2Hand.length; i++) {
            const card = p2Hand[i];
            for (const lane of legalLanes) {
                let score = 0;

                // Base card role value
                if (card.r === 'A') score -= 5;
                else if (card.v <= 6) score += 1;
                else if (card.v <= 10) score += 3;
                else score += 5;

                // Read lane state
                let aiCount = 0, enemyCount = 0, nearestEnemyRow = -1, nearestEnemyHp = 0, furthestAiRow = -1;
                let enemyAceInLane = false;
                let enemyAceStaged = false;
                for (let r = 0; r < 8; r++) {
                    const occ = board[r][lane];
                    if (!occ) continue;
                    if (occ.p === 2) {
                        aiCount++;
                        furthestAiRow = Math.max(furthestAiRow, r);
                    } else {
                        enemyCount++;
                        nearestEnemyRow = Math.max(nearestEnemyRow, r);
                        nearestEnemyHp = occ.hp;
                        if (occ.r === 'A') {
                            enemyAceInLane = true;
                            if (r >= 6) enemyAceStaged = true;
                        }
                    }
                }

                // Threat response
                if (nearestEnemyRow >= 5) score += 8;
                else if (nearestEnemyRow >= 3) score += 4;

                // Hotfix: don't keep feeding a lane where the player staged an Ace.
                // An Ace in the player's backline is a bad lane to dump into unless this is our only lane.
                if (enemyAceStaged) {
                    score -= 18;
                    if (aiCount > 0) score -= 8;
                    if (card.v >= 10 || card.r === 'A') score -= 6;
                } else if (enemyAceInLane) {
                    score -= 6;
                }

                // Pressure/open lane
                if (enemyCount === 0) score += 4;
                if (furthestAiRow >= 2 && enemyCount === 0) score += 5;

                // Reinforcement / occasional flooding
                if (aiCount > 0) {
                    score += 1.5;
                    if (furthestAiRow >= 2) score += 3;
                    if (posture === 'swarmy') score += 1.5;
                    if (aiCount >= 2) score -= 7; // don't clog too hard
                }

                // Lane congestion penalty
                if (aiCount + enemyCount >= 3) score -= 3;
                if (aiCount >= 3) score -= 9;

                // Card-to-job efficiency
                if (enemyCount === 0 && card.v >= 12) score -= 2; // don't waste top end into emptiness too much
                if (nearestEnemyHp > 0) {
                    const diff = card.hp - nearestEnemyHp;
                    if (diff >= 0 && diff <= 3) score += 4;
                    if (diff < -3) score -= 3;
                }

                // Ace as tactical bullet
                if (card.r === 'A') {
                    if (nearestEnemyHp >= 10) score += 14;
                    else if (nearestEnemyHp >= 7) score += 8;
                    else if (enemyCount === 0) score -= 8;
                    if (p2Hp < p1Hp) score += 2;
                }

                // Posture bends
                if (posture === 'aggressive') {
                    if (enemyCount === 0) score += 3;
                    if (furthestAiRow >= 2) score += 2;
                } else if (posture === 'defensive') {
                    if (nearestEnemyRow >= 4) score += 4;
                    if (enemyCount > 0) score += 2;
                } else if (posture === 'opportunistic') {
                    if (nearestEnemyHp >= 10) score += 4;
                    if (card.r === 'A') score += 2;
                }

                // Small noise so it doesn't feel deterministic
                score += Math.random() * 2.5;

                moves.push({ handIndex: i, lane, score });
            }
        }

        moves.sort((a, b) => b.score - a.score);
        const top = moves.slice(0, Math.min(4, moves.length));
        const weights = top.map((m, idx) => Math.max(1, [55, 25, 12, 8][idx] + (m.score - top[top.length - 1].score)));
        let roll = Math.random() * weights.reduce((a, b) => a + b, 0);
        let chosen = top[0];
        for (let i = 0; i < top.length; i++) {
            roll -= weights[i];
            if (roll <= 0) {
                chosen = top[i];
                break;
            }
        }

        const picked = p2Hand.splice(chosen.handIndex, 1)[0];
        board[0][chosen.lane] = { ...picked, p: 2 };
        markTrail(0, chosen.lane, 2);
    }

    function aiPlaceCard() {
        if (gameMode === 'hotseat') return;
        if (aiMode === 'cracked') aiPlaceCardCracked();
        else aiPlaceCardNormal();
    }

    async function resolveTurn() {
        if(isAnim || gameOverShown) return;
        if (!readyToAdvanceTurn()) {
            if (!finalResolveMode) {
                if (playerCanStageCard() && !hasPlayerStagedCard()) logMsg('Place a card in your staging row before ending the turn.');
                else if (aiCanStageCard() && !hasAiStagedCard()) logMsg('Waiting for the AI to stage its card.');
            }
            return;
        }
        isAnim = true;
        document.getElementById('next-btn').disabled = true;

        await processCombatAnims();
        advanceBoardLogic();
        p1PlacedThisTurn = false;
        p2PlacedThisTurn = false;
        selectedHandIndex = null;

        if (!finalResolveMode && (p1Hp <= 0 || p2Hp <= 0)) {
            finalResolveMode = true;
            lethalSnapshot = { p1: p1Hp, p2: p2Hp };
            logMsg("Lethal reached. Final board resolve in progress...");
        }

        if (!finalResolveMode) {
            drawCards();
            if (gameMode === 'hotseat') {
                if (playerSide === 'blue') hotseatStage = 'p1';
                else hotseatStage = 'p2';

                if (hotseatStage === 'p1' && p1Hand.length === 0 && p2Hand.length > 0) hotseatStage = 'pass';
                if (hotseatStage === 'p2' && p2Hand.length === 0 && p1Hand.length > 0) hotseatStage = 'resolve';
                if (p1Hand.length === 0 && p2Hand.length === 0) hotseatStage = 'resolve';
            } else if(playerSide === 'red') {
                aiPlaceCard();
            }
        }

        render();
        isAnim = false;

        const hasBoardCards = board.some(row => row.some(cell => cell));
        const noCardsLeftAnywhere = !hasBoardCards && p1Hand.length === 0 && p2Hand.length === 0 && p1Deck.length === 0 && p2Deck.length === 0;

        if (!finalResolveMode && noCardsLeftAnywhere && !lethalSnapshot) {
            lethalSnapshot = { p1: p1Hp, p2: p2Hp };
        }

        if (finalResolveMode) {
            if (hasBoardCards) {
                setTimeout(() => {
                    if (!isAnim && !gameOverShown) resolveTurn();
                }, 450);
                return;
            }
            checkGameOver();
            return;
        }

        document.getElementById('next-btn').disabled = false;
        checkGameOver();
    }

    async function processCombatAnims() {
        let found = false;
        for(let c=0; c<6; c++) {
            let col = [];
            for(let r=0; r<8; r++) if(board[r][c]) col.push({...board[r][c], r: r});
            col.forEach(card => card.tr = card.p === 1 ? card.r - 1 : card.r + 1);
            for(let i=0; i<col.length; i++) {
                for(let j=i+1; j<col.length; j++) {
                    let a = col[i], b = col[j];
                    if(a.p !== b.p && ((a.tr === b.tr) || (a.r === b.tr && b.r === a.tr))) {
                        found = true;
                        let dA = document.querySelector(`[data-uuid="${a.uuid}"]`);
                        let dB = document.querySelector(`[data-uuid="${b.uuid}"]`);
                        if(dA) dA.style.background = '#00aa00';
                        if(dB) dB.style.background = '#00aa00';
                    }
                }
            }
        }
        if(found) await new Promise(r => setTimeout(r, 600));
    }

    function advanceBoardLogic() {
        let next = Array(8).fill(null).map(() => Array(6).fill(null));

        for(let c=0; c<6; c++) {
            let col = [];
            for(let r=0; r<8; r++) {
                if(board[r][c]) {
                    let card = { ...board[r][c] };
                    card.cr = r;
                    card.nr = card.p === 1 ? r - 1 : r + 1;
                    col.push(card);
                }
            }

            // Frontline-only combat: only the nearest opposing contact pair in a lane resolves.
            for(let i=0; i<col.length - 1; i++) {
                let a = col[i];
                let b = col[i + 1];

                if(a.p === b.p) continue;

                const willContact =
                    (a.nr === b.nr) ||
                    (a.cr === b.nr && b.cr === a.nr);

                if(!willContact) continue;

                if (a.r === 'A' && b.r === 'A') {
                    a.hp = 0;
                    b.hp = 0;
                } else if (a.r === 'A') {
                    b.hp = 0;
                } else if (b.r === 'A') {
                    a.hp = 0;
                } else {
                    // Suit tie-breaker on equal current value only
                    if (a.hp === b.hp) {
                        if (suitSurpasses(a.suit, b.suit)) {
                            a.hp = 1;
                            b.hp = 0;
                        } else if (suitSurpasses(b.suit, a.suit)) {
                            a.hp = 0;
                            b.hp = 1;
                        } else {
                            let clash = Math.min(a.hp, b.hp);
                            a.hp -= clash;
                            b.hp -= clash;
                        }
                    } else {
                        let clash = Math.min(a.hp, b.hp);
                        a.hp -= clash;
                        b.hp -= clash;
                    }
                }

                break;
            }

            col.forEach(card => {
                if(card.hp <= 0) return;

                if(card.p === 1 && card.nr === 0) {
                    p2Hp -= card.hp;
                }
                else if(card.p === 2 && card.nr === 7) {
                    p1Hp -= card.hp;
                }
                else if(card.nr >= 0 && card.nr <= 7) {
                    if(!next[card.nr][c]) {
                        next[card.nr][c] = { ...card };
                        markTrail(card.nr, c, card.p);
                    } else {
                        next[card.cr][c] = { ...card };
                        markTrail(card.cr, c, card.p);
                    }
                }
            });
        }

        board = next;
    }

    function logMsg(m) {
        const l = document.getElementById('log');
        l.innerHTML += `<div>> ${m}</div>`;
        l.scrollTop = l.scrollHeight;
    }

    window.addEventListener('resize', () => {
        if (!document.getElementById('selection-screen') || document.getElementById('selection-screen').style.display === 'none') render();
    });

    function checkGameOver() {
        if (gameOverShown) return;

        const hasBoardCards = board.some(row => row.some(cell => cell));
        const noCardsLeftAnywhere = !hasBoardCards && p1Hand.length === 0 && p2Hand.length === 0 && p1Deck.length === 0 && p2Deck.length === 0;

        if (hasBoardCards) return;

        if ((p1Hp <= 0 || p2Hp <= 0) || noCardsLeftAnywhere) {
            gameOverShown = true;
            const overlay = document.getElementById('game-over');
            const winnerText = document.getElementById('winner-text');
            const battleScoreEl = document.getElementById('battle-score-values');
            const finalScoreEl = document.getElementById('final-score-values');

            const winnerColor = p1Hp > p2Hp ? p1ColorName : p2ColorName;
            winnerText.innerText = `${winnerColor} WINS!`;
            winnerText.style.color = winnerColor === 'BLUE' ? '#4dabf7' : '#ff6b6b';
            overlay.classList.remove('winner-blue', 'winner-red');
            overlay.classList.add(winnerColor === 'BLUE' ? 'winner-blue' : 'winner-red');

            if (!lethalSnapshot) lethalSnapshot = { p1: p1Hp, p2: p2Hp };

            const leftClass = p1ColorName === 'BLUE' ? 'score-left-blue' : 'score-left-red';
            const rightClass = p2ColorName === 'BLUE' ? 'score-right-blue' : 'score-right-red';

            battleScoreEl.innerHTML = `<span class="${leftClass}">${lethalSnapshot.p1}</span><span class="score-sep">•</span><span class="${rightClass}">${lethalSnapshot.p2}</span>`;
            finalScoreEl.innerHTML = `<span class="${leftClass}">${p1Hp}</span><span class="score-sep">•</span><span class="${rightClass}">${p2Hp}</span>`;

            overlay.style.display = 'flex';
            document.getElementById('next-btn').disabled = true;
        }
    }
    document.querySelectorAll('input[name="game-mode"]').forEach(el => {
        el.addEventListener('change', updateSideButtonState);
    });
    updateSideButtonState();

</script>
