    function getStagedPlayerCard(lane) {
        const card = board[7][lane];
        return card && card.p === 1 ? card : null;
    }

    function countLaneOwner(lane, owner) {
        let count = 0;
        for (let r = 0; r < 8; r++) {
            if (board[r][lane] && board[r][lane].p === owner) count++;
        }
        return count;
    }

    function strongestEnemyInLane(lane) {
        let best = null;
        for (let r = 0; r < 8; r++) {
            const occ = board[r][lane];
            if (!occ || occ.p !== 1) continue;
            if (!best || occ.hp > best.hp) best = occ;
        }
        return best;
    }

    function aiLaneTail(lane) {
        let tail = null;
        for (let r = 0; r < 8; r++) {
            const occ = board[r][lane];
            if (occ && occ.p === 2) tail = occ;
        }
        return tail;
    }

    function findSafeAlternativeLanes(currentLane, legalLanes) {
        return legalLanes.filter(lane => lane !== currentLane && !laneIsPoisonedForAi(lane));
    }

    function laneIsPoisonedForAi(lane) {
        const staged = getStagedPlayerCard(lane);
        if (!staged) return false;
        if (staged.r === 'A') return true;
        if (staged.v >= 10) return true;
        return false;
    }

    function enemyCanBeatEqualOnSuit(enemyCard, aiCard) {
        return suitFunctionsEnabled && enemyCard && aiCard && enemyCard.hp === aiCard.hp && suitSurpasses(enemyCard.suit, aiCard.suit);
    }

    function aiCanAscendAgainst(enemyCard, aiCard) {
        return ascensionModeEnabled && suitFunctionsEnabled && enemyCard && aiCard &&
            enemyCard.r !== 'A' && aiCard.r !== 'A' &&
            enemyCard.hp === aiCard.hp && suitSurpasses(aiCard.suit, enemyCard.suit);
    }

    function laneIntelForAi(lane, card = null) {
        let aiCount = 0, enemyCount = 0, nearestEnemy = null, nearestAi = null;
        let enemyAceStaged = false, enemyHighStaged = false, enemySuitThreat = false;
        let aiTail = null, laneDamagePotential = 0, crowdedEnemyValue = 0;

        for (let r = 0; r < 8; r++) {
            const occ = board[r][lane];
            if (!occ) continue;
            if (occ.p === 2) {
                aiCount++;
                aiTail = occ;
                nearestAi = occ;
            } else {
                enemyCount++;
                nearestEnemy = occ;
                crowdedEnemyValue += occ.hp;
                laneDamagePotential += occ.hp;
            }
        }

        const stagedEnemy = getStagedPlayerCard(lane);
        if (stagedEnemy) {
            enemyAceStaged = stagedEnemy.r === 'A';
            enemyHighStaged = stagedEnemy.v >= 10;
            if (card && enemyCanBeatEqualOnSuit(stagedEnemy, card)) enemySuitThreat = true;
        }

        return {
            aiCount,
            enemyCount,
            nearestEnemy,
            nearestAi,
            enemyAceStaged,
            enemyHighStaged,
            enemySuitThreat,
            stagedEnemy,
            aiTail,
            laneDamagePotential,
            crowdedEnemyValue,
            openRunway: enemyCount === 0
        };
    }

    function cardRole(card) {
        if (card.isJoker) return 'joker';
        if (card.r === 'A') return 'ace';
        if (card.v <= 5) return 'low';
        if (card.v <= 9) return 'mid';
        return 'high';
    }

    function jokerScoreForLane(card, lane, bias, legalLanes) {
        const info = laneIntelForAi(lane, card);
        let score = 0;
        if (aiMode === 'autumn') {
            score += info.enemyCount * 18;
            score += info.aiCount * 8;
            if (info.stagedEnemy && info.stagedEnemy.r === 'A') score += 16;
            if (info.crowdedEnemyValue >= 14) score += 14;
            if (info.openRunway) score -= 22;
            if (laneIsPoisonedForAi(lane)) score += 12;
        } else if (aiMode === 'winter') {
            const totalEnemy = p1Hand.length + board.flat().filter(c => c && c.p === 1).length;
            const totalAi = p2Hand.length + board.flat().filter(c => c && c.p === 2).length;
            score += (totalEnemy - totalAi) * 6;
            score += Math.max(0, info.crowdedEnemyValue - 8);
            if (p2Hp < p1Hp) score += 24;
            if (board.flat().filter(c => c).length >= 6) score += 18;
            if (p2Hp > p1Hp + 6) score -= 26;
        } else {
            score -= 60;
        }
        return score;
    }

    function cardScoreForLane(card, lane, bias, legalLanes) {
        const info = laneIntelForAi(lane, card);
        const role = cardRole(card);
        const isJoker = role === 'joker';
        const isAce = role === 'ace';
        const isLow = role === 'low';
        const isMid = role === 'mid';
        const isHigh = role === 'high';
        let score = 0;

        if (isJoker) {
            return jokerScoreForLane(card, lane, bias, legalLanes);
        }

        const safeAlternatives = findSafeAlternativeLanes(lane, legalLanes);
        const otherSafeExists = safeAlternatives.length > 0;

        if (info.enemyAceStaged) {
            score -= bias.acePoisonLanePenalty;
            if (isHigh || isAce) score -= 120;
            if (isMid) score -= 55;
            if (isLow) score += 10;
            if (otherSafeExists) score -= 120;
        } else if (info.enemyHighStaged) {
            score -= bias.poisonLanePenalty;
            if (isHigh) score -= 70;
            if (isAce) score -= 40;
            if (isLow) score += 8;
            if (otherSafeExists) score -= 60;
        }

        if (info.enemySuitThreat) {
            score -= bias.suitTrapPenalty;
            if (isHigh) score -= 35;
            if (otherSafeExists) score -= 24;
        }

        if (info.openRunway) {
            score += bias.openLaneBonus;
            score += bias.faceRaceBonus;
            if (isLow) score += bias.lowCardBonus + bias.chipBonus + 5;
            if (isMid) score += 4;
            if (isHigh) score -= bias.highIntoOpenPenalty;
            if (isAce) score -= bias.aceHoldBonus + 10;
        }

        if (info.enemyCount > 0 && !info.enemyAceStaged) {
            score += bias.defenseBonus;
            if (info.nearestEnemy) {
                if (isAce) {
                    score += info.enemyCount * bias.crowdedAceBonus;
                    score += Math.min(30, info.crowdedEnemyValue);
                    if (info.enemyCount >= 2) score += 18;
                } else {
                    if (card.hp > info.nearestEnemy.hp) score += 16;
                    if (card.hp === info.nearestEnemy.hp) {
                        if (aiCanAscendAgainst(info.nearestEnemy, card)) {
                            score += bias.ascensionBonus + 18;
                            if (info.enemyCount >= 2) score += 10;
                        } else if (suitFunctionsEnabled && suitSurpasses(card.suit, info.nearestEnemy.suit)) {
                            score += 8;
                        } else if (suitFunctionsEnabled && suitSurpasses(info.nearestEnemy.suit, card.suit)) {
                            score -= bias.suitTrapPenalty;
                        }
                    }
                    if (card.hp < info.nearestEnemy.hp && info.nearestEnemy.r !== 'A') score -= 18;
                }
            }
        }

        if (info.aiCount > 0) {
            score += bias.backfillBonus * Math.min(info.aiCount, 2);
            if (info.aiTail && info.aiTail.r === 'A') {
                if (isHigh) score += 24 + bias.stackedFollowBonus;
                if (isMid) score += 12;
                if (isLow) score -= 10;
            } else if (info.aiTail && info.aiTail.v >= 10) {
                if (isHigh) score += 10 + bias.stackedFollowBonus;
                if (isMid) score += 5;
            }
        }

        if (isAce) {
            score += info.enemyCount * 8;
            if (info.enemyCount >= 2) score += bias.crowdedAceBonus;
            if (info.openRunway) score -= bias.aceHoldBonus;
            if (!info.openRunway && info.crowdedEnemyValue >= 16) score += 12;
            if (info.enemyCount === 1 && info.nearestEnemy && info.nearestEnemy.hp <= 4 && !info.enemyAceStaged) score -= 105;
            if (info.enemyCount === 1 && info.crowdedEnemyValue <= 5 && !info.enemyHighStaged) score -= 70;
            if (info.aiTail && info.aiTail.r === 'A' && info.enemyCount < 3 && !info.enemyAceStaged) score -= 190;
            if (info.aiTail && info.aiTail.r === 'A' && info.crowdedEnemyValue < 12) score -= 120;
        }

        if (isHigh && info.enemyCount === 1 && info.nearestEnemy && info.nearestEnemy.hp <= 3 && !info.enemyHighStaged && !info.enemyAceStaged) {
            score -= 18;
        }

        if (isLow && !info.enemyAceStaged) {
            score += bias.chipBonus;
            if (info.enemyCount === 0) score += 9;
            if (info.aiCount === 0) score += 4;
        }

        if (isMid) score += 3;
        if (isHigh && info.enemyCount > 0) score += 8;
        if (isHigh && info.openRunway && !info.aiTail) score -= bias.highIntoOpenPenalty;
        if (isHigh && info.stagedEnemy && info.stagedEnemy.r === 'A') score -= 140;

        // reward denying the player's strongest pressure lane
        const strongestEnemy = strongestEnemyInLane(lane);
        if (strongestEnemy && strongestEnemy === info.nearestEnemy && strongestEnemy.hp >= 10 && !isLow) {
            score += 8;
        }

        // seasonally reward development behind your own pressure
        if (info.aiTail && info.aiTail.v >= 10 && !info.stagedEnemy) {
            if (isHigh) score += bias.pressureBonus;
            if (isMid) score += Math.floor(bias.pressureBonus / 2);
        }

        return score;
    }

    function chooseSeasonalMove(legalLanes) {
        const bias = aiSeasonBias();
        const moves = [];
        for (let i = 0; i < p2Hand.length; i++) {
            const card = p2Hand[i];
            for (const lane of legalLanes) {
                moves.push({
                    handIndex: i,
                    lane,
                    score: cardScoreForLane(card, lane, bias, legalLanes),
                    role: cardRole(card)
                });
            }
        }
        moves.sort((a, b) => b.score - a.score);

        // Hard sanity filter: unless trapped, do not feed a staged enemy Ace/high lane with premium cards.
        const notPoisoned = moves.filter(move => {
            const info = laneIntelForAi(move.lane, p2Hand[move.handIndex]);
            if (!laneIsPoisonedForAi(move.lane)) return true;
            if (legalLanes.every(l => laneIsPoisonedForAi(l))) return true;
            return move.role === 'low' || move.role === 'joker';
        });

        let usable = notPoisoned.length ? notPoisoned : moves;

        const antiWaste = usable.filter(move => {
            if (move.role !== 'ace') return true;
            const info = laneIntelForAi(move.lane, p2Hand[move.handIndex]);
            if (legalLanes.length === 1) return true;
            if (info.enemyAceStaged) return true;
            if (info.enemyCount >= 2) return true;
            if (info.crowdedEnemyValue >= 10) return true;
            if (info.aiTail && info.aiTail.r === 'A') return false;
            if (info.enemyCount === 1 && info.nearestEnemy && info.nearestEnemy.hp <= 4) return false;
            if (info.openRunway) return false;
            return true;
        });
        if (antiWaste.length) usable = antiWaste;

        const topN = aiSeasonBias().preferredImperfectTop || 4;
        const top = usable.slice(0, Math.min(topN, usable.length));
        const imperfectRoll = Math.random();
        if (!top.length) return null;
        if (imperfectRoll < 0.70) return top[0];
        if (imperfectRoll < 0.87 && top[1]) return top[1];
        if (imperfectRoll < 0.95 && top[2]) return top[2];
        return top[Math.floor(Math.random() * top.length)];
    }

    function aiPlaceCardSeasonal() {
        if (p2Hand.length === 0) return;
        const legalLanes = getActiveLanes().filter(c => !board[0][c]);
        if (!legalLanes.length) return;

        const chosen = chooseSeasonalMove(legalLanes);
        if (!chosen) return;

        const picked = p2Hand.splice(chosen.handIndex, 1)[0];
        board[0][chosen.lane] = { ...picked, p: 2 };
        markTrail(0, chosen.lane, 2);
    }

    function aiPlaceCardCracked() {
        aiPlaceCardSeasonal();
    }

    function aiPlaceCard() {
        if (gameMode === 'hotseat') return;
        const seasonalModes = ['spring', 'summer', 'autumn', 'winter'];
        if (seasonalModes.includes(aiMode)) aiPlaceCardSeasonal();
        else if (aiMode === 'cracked') aiPlaceCardCracked();
        else aiPlaceCardNormal();
    }

    async function resolveTurn() {
        if(isAnim || gameOverShown) return;
        if (!readyToAdvanceTurn()) {
            if (!finalResolveMode) {
                if (playerCanStageCard() && !hasPlayerStagedCard()) logMsg('Place a card in your staging row before ending the turn.');
                else if (aiCanStageCard() && !hasAiStagedCard()) logMsg('Waiting for the AI to stage its card.');
            }
            return;
        }
        isAnim = true;
        document.getElementById('next-btn').disabled = true;

        await processCombatAnims();
        advanceBoardLogic();
        await playJokerAnimation();
        await playDamageFlashAnimation();
        await playAscensionAnimation();
        p1PlacedThisTurn = false;
        p2PlacedThisTurn = false;
        selectedHandIndex = null;

        if (!finalResolveMode && (p1Hp <= 0 || p2Hp <= 0)) {
            finalResolveMode = true;
            lethalSnapshot = { p1: p1Hp, p2: p2Hp };
            logMsg("Lethal reached. Final board resolve in progress...");
        }

        if (!finalResolveMode) {
            drawCards();
            if (gameMode === 'hotseat') {
                if (playerSide === 'blue') hotseatStage = 'p1';
                else hotseatStage = 'p2';

                if (hotseatStage === 'p1' && p1Hand.length === 0 && p2Hand.length > 0) hotseatStage = 'pass';
                if (hotseatStage === 'p2' && p2Hand.length === 0 && p1Hand.length > 0) hotseatStage = 'resolve';
                if (p1Hand.length === 0 && p2Hand.length === 0) hotseatStage = 'resolve';
            } else if(playerSide === 'red') {
                aiPlaceCard();
            }
        }

        render();
        isAnim = false;

        const hasBoardCards = board.some(row => row.some(cell => cell));
        const noCardsLeftAnywhere = !hasBoardCards && p1Hand.length === 0 && p2Hand.length === 0 && p1Deck.length === 0 && p2Deck.length === 0;

        if (!finalResolveMode && noCardsLeftAnywhere && !lethalSnapshot) {
            lethalSnapshot = { p1: p1Hp, p2: p2Hp };
        }

        if (finalResolveMode) {
            if (hasBoardCards) {
                setTimeout(() => {
                    if (!isAnim && !gameOverShown) resolveTurn();
                }, 450);
                return;
            }
            checkGameOver();
            return;
        }

        document.getElementById('next-btn').disabled = false;
        checkGameOver();
    }

    async function processCombatAnims() {
        let found = false;
        for(let c=0; c<6; c++) {
            let col = [];
            for(let r=0; r<8; r++) if(board[r][c]) col.push({...board[r][c], r: r});
            col.forEach(card => card.tr = card.p === 1 ? card.r - 1 : card.r + 1);
            for(let i=0; i<col.length; i++) {
                for(let j=i+1; j<col.length; j++) {
                    let a = col[i], b = col[j];
                    if(a.p !== b.p && ((a.tr === b.tr) || (a.r === b.tr && b.r === a.tr))) {
                        found = true;
                        let dA = document.querySelector(`[data-uuid="${a.uuid}"]`);
                        let dB = document.querySelector(`[data-uuid="${b.uuid}"]`);
                        if(dA) dA.style.background = '#00aa00';
                        if(dB) dB.style.background = '#00aa00';
                    }
                }
            }
        }
        if(found) await new Promise(r => setTimeout(r, 600));
    }

    function applyAutumnJokerToLane(col) {
        return col
            .filter(card => !card.isJoker)
            .map(card => ({
                ...card,
                // Preserve suit, allegiance, color class, and animation identity.
                r: '6',
                v: 6,
                maxHp: 6,
                hp: 6
            }));
    }

    function valueToRank(value) {
        if (value === 11) return 'J';
        if (value === 12) return 'Q';
        if (value === 13) return 'K';
        return String(value);
    }

    function applySpringJokerToMatrix(matrix, owner) {
        const convertedUuids = [];
        for (let r = 1; r <= 6; r++) {
            for (let c = 0; c < 6; c++) {
                const card = matrix[r][c];
                if (!card || card.isJoker || card.p !== owner || card.r === 'A') continue;
                const boosted = Math.min(13, (card.hp || 0) + 2);
                matrix[r][c] = {
                    ...card,
                    hp: boosted
                };
                convertedUuids.push(matrix[r][c].uuid);
            }
        }
        return convertedUuids;
    }

    function applySummerJokerToMatrix(matrix) {
        const convertedUuids = [];
        for (let r = 1; r <= 6; r++) {
            for (let c = 0; c < 6; c++) {
                const card = matrix[r][c];
                if (!card || card.isJoker) continue;
                const updated = (card.hp || 0) - 1;
                convertedUuids.push(card.uuid);
                if (updated <= 0) {
                    matrix[r][c] = null;
                } else {
                    matrix[r][c] = {
                        ...card,
                        hp: updated
                    };
                }
            }
        }
        return convertedUuids;
    }

    function advanceBoardLogic() {
        let next = Array(8).fill(null).map(() => Array(6).fill(null));
        const damageCellsThisResolve = [];
        let winterTriggered = false;

        for(let c=0; c<6; c++) {
            let col = [];
            for(let r=0; r<8; r++) {
                if(board[r][c]) {
                    let card = { ...board[r][c] };
                    card.cr = r;
                    card.nr = card.p === 1 ? r - 1 : r + 1;
                    col.push(card);
                }
            }

            const jokerCards = col.filter(card => card.isJoker && ((card.p === 1 && card.cr === 7) || (card.p === 2 && card.cr === 0)));
            if (jokerCards.length) {
                for (const joker of jokerCards) {
                    col = col.filter(card => card.uuid !== joker.uuid);

                    if (aiMode === 'spring') {
                        const convertedSet = new Set([
                            ...applySpringJokerToMatrix(board, joker.p),
                            ...applySpringJokerToMatrix(next, joker.p)
                        ]);
                        col = col.map(card => {
                            if (card.isJoker || card.p !== joker.p || card.r === 'A') return card;
                            const boosted = Math.min(13, (card.hp || 0) + 2);
                            convertedSet.add(card.uuid);
                            return {
                                ...card,
                                hp: boosted
                            };
                        });
                        queueJokerEffect('spring', { owner: joker.p, convertedUuids: Array.from(convertedSet) });
                        logMsg('Joker: Spring empowers all of the triggering player\'s board cards by +2.');
                    } else if (aiMode === 'summer') {
                        const convertedSet = new Set([
                            ...applySummerJokerToMatrix(board),
                            ...applySummerJokerToMatrix(next)
                        ]);
                        col = col.map(card => {
                            if (card.isJoker) return card;
                            const updatedHp = (card.hp || 0) - 1;
                            convertedSet.add(card.uuid);
                            if (updatedHp <= 0) return null;
                            return { ...card, hp: updatedHp };
                        }).filter(Boolean);
                        queueJokerEffect('summer', { owner: joker.p, convertedUuids: Array.from(convertedSet) });
                        logMsg('Joker: Summer scorches every card on the board for 1 damage.');
                    } else if (aiMode === 'autumn') {
                        col = applyAutumnJokerToLane(col);
                        queueJokerEffect('autumn', { col: c, owner: joker.p, convertedUuids: col.map(card => card.uuid) });
                        logMsg('Joker: Autumn equalizes every card in the lane to a six.');
                    } else if (aiMode === 'winter') {
                        winterTriggered = true;
                        queueJokerEffect('winter', { col: c, owner: joker.p });
                        logMsg('Joker: Winter wipes the board clean.');
                    } else {
                        logMsg('Joker spent with no seasonal effect.');
                    }
                }
            }

            if (winterTriggered) continue;

            // Frontline-only combat: only the nearest opposing contact pair in a lane resolves.
            for(let i=0; i<col.length - 1; i++) {
                let a = col[i];
                let b = col[i + 1];

                if(a.p === b.p) continue;

                const willContact =
                    (a.nr === b.nr) ||
                    (a.cr === b.nr && b.cr === a.nr);

                if(!willContact) continue;

                if (a.r === 'A' && b.r === 'A') {
                    a.hp = 0;
                    b.hp = 0;
                } else if (a.r === 'A') {
                    b.hp = 0;
                } else if (b.r === 'A') {
                    a.hp = 0;
                } else {
                    // Suit tie-breaker on equal current value only
                    if (a.hp === b.hp) {
                        if (suitSurpasses(a.suit, b.suit)) {
                            b.hp = 0;
                            if (ascensionModeEnabled) {
                                a.r = 'A';
                                a.v = 14;
                                a.maxHp = 1;
                                a.hp = 1;
                                queueAscension(a.uuid, a.cr, c, a.p);
                            } else {
                                a.hp = 1;
                            }
                        } else if (suitSurpasses(b.suit, a.suit)) {
                            a.hp = 0;
                            if (ascensionModeEnabled) {
                                b.r = 'A';
                                b.v = 14;
                                b.maxHp = 1;
                                b.hp = 1;
                                queueAscension(b.uuid, b.cr, c, b.p);
                            } else {
                                b.hp = 1;
                            }
                        } else {
                            let clash = Math.min(a.hp, b.hp);
                            a.hp -= clash;
                            b.hp -= clash;
                        }
                    } else {
                        let clash = Math.min(a.hp, b.hp);
                        a.hp -= clash;
                        b.hp -= clash;
                    }
                }

                break;
            }

            col.forEach(card => {
                if(card.hp <= 0) return;

                if(card.p === 1 && card.nr === 0) {
                    p2Hp -= card.hp;
                    damageCellsThisResolve.push({ row: 0, col: c });
                }
                else if(card.p === 2 && card.nr === 7) {
                    p1Hp -= card.hp;
                    damageCellsThisResolve.push({ row: 7, col: c });
                }
                else if(card.nr >= 0 && card.nr <= 7) {
                    if(!next[card.nr][c]) {
                        next[card.nr][c] = { ...card };
                        markTrail(card.nr, c, card.p);
                    } else {
                        next[card.cr][c] = { ...card };
                        markTrail(card.cr, c, card.p);
                    }
                }
            });
        }

        if (winterTriggered) {
            board = Array(8).fill(null).map(() => Array(6).fill(null));
            pendingDamageCells = [];
            pendingAscension = null;
            return;
        }

        board = next;
        pendingDamageCells = damageCellsThisResolve;
    }

    function logMsg(m) {
        const l = document.getElementById('log');
        l.innerHTML += `<div>> ${m}</div>`;
        l.scrollTop = l.scrollHeight;
    }

    window.addEventListener('resize', () => {
        if (!document.getElementById('selection-screen') || document.getElementById('selection-screen').style.display === 'none') render();
    });

    function checkGameOver() {
        if (gameOverShown) return;

        const hasBoardCards = board.some(row => row.some(cell => cell));
        const noCardsLeftAnywhere = !hasBoardCards && p1Hand.length === 0 && p2Hand.length === 0 && p1Deck.length === 0 && p2Deck.length === 0;

        if (hasBoardCards) return;

        if ((p1Hp <= 0 || p2Hp <= 0) || noCardsLeftAnywhere) {
            gameOverShown = true;
            const overlay = document.getElementById('game-over');
            const winnerText = document.getElementById('winner-text');
            const battleScoreEl = document.getElementById('battle-score-values');
            const finalScoreEl = document.getElementById('final-score-values');

            const winnerColor = p1Hp > p2Hp ? p1ColorName : p2ColorName;
            winnerText.innerText = `${winnerColor} WINS!`;
            winnerText.style.color = winnerColor === 'BLUE' ? '#4dabf7' : '#ff6b6b';
            overlay.classList.remove('winner-blue', 'winner-red');
            overlay.classList.add(winnerColor === 'BLUE' ? 'winner-blue' : 'winner-red');

            if (!lethalSnapshot) lethalSnapshot = { p1: p1Hp, p2: p2Hp };

            const leftClass = p1ColorName === 'BLUE' ? 'score-left-blue' : 'score-left-red';
            const rightClass = p2ColorName === 'BLUE' ? 'score-right-blue' : 'score-right-red';

            battleScoreEl.innerHTML = `<span class="${leftClass}">${lethalSnapshot.p1}</span><span class="score-sep">•</span><span class="${rightClass}">${lethalSnapshot.p2}</span>`;
            finalScoreEl.innerHTML = `<span class="${leftClass}">${p1Hp}</span><span class="score-sep">•</span><span class="${rightClass}">${p2Hp}</span>`;

            overlay.style.display = 'flex';
            document.getElementById('next-btn').disabled = true;
        }
    }
    document.querySelectorAll('input[name="game-mode"]').forEach(el => {
        el.addEventListener('change', updateSideButtonState);
    });
    updateSideButtonState();

</script>
</body>
</html>
